version: "3.9"

services:
  triton:
    image: nvcr.io/nvidia/tritonserver:24.05-vllm-python-py3
    container_name: triton-llm
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./model_repository:/models
      - ${LOCAL_MODEL_PATH}:/local_model:ro   # mount your local weights as read-only
    command: >
      tritonserver
      --model-repository=/models
      --log-verbose=1
      --http-port=8000
      --grpc-port=8001
      --metrics-port=8002
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # gRPC
      - "8002:8002"   # Metrics
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api:
    build:
      context: ./client-api
      dockerfile: Dockerfile
    container_name: llm-api
    restart: unless-stopped
    environment:
      - TRITON_HOST=triton
      - TRITON_HTTP_PORT=8000
      - TRITON_GRPC_PORT=8001
      - API_KEY=${API_KEY:-changeme}
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    depends_on:
      triton:
        condition: service_healthy
